<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <rect width="300" height="400" fill="#f0f4f8"/>
  
  <!-- DynamoDB -->
  <rect x="110" y="30" width="80" height="40" fill="#3f51b5" rx="5"/>
  <text x="150" y="55" font-family="Arial" font-size="11" fill="white" text-anchor="middle">DynamoDB</text>
  
  <!-- Arrow -->
  <line x1="150" y1="70" x2="150" y2="100" stroke="#666" stroke-width="1.5"/>
  
  <!-- Lambda -->
  <rect x="110" y="100" width="80" height="40" fill="#ff5722" rx="5"/>
  <text x="150" y="125" font-family="Arial" font-size="11" fill="white" text-anchor="middle">Lambda</text>
  
  <!-- Arrow -->
  <line x1="150" y1="140" x2="150" y2="170" stroke="#666" stroke-width="1.5"/>
  
  <!-- API Gateway -->
  <rect x="100" y="170" width="100" height="40" fill="#9c27b0" rx="5"/>
  <text x="150" y="195" font-family="Arial" font-size="11" fill="white" text-anchor="middle">API Gateway</text>
  
  <!-- Arrows to users -->
  <line x1="110" y1="210" x2="70" y2="270" stroke="#666" stroke-width="1.5"/>
  <line x1="150" y1="210" x2="150" y2="270" stroke="#666" stroke-width="1.5"/>
  <line x1="190" y1="210" x2="230" y2="270" stroke="#666" stroke-width="1.5"/>
  
  <!-- Users -->
  <!-- User 1 -->
  <circle cx="70" cy="290" r="15" fill="none" stroke="#666" stroke-width="1.5"/>
  <line x1="70" y1="305" x2="70" y2="340" stroke="#666" stroke-width="1.5"/>
  <line x1="55" y1="320" x2="85" y2="320" stroke="#666" stroke-width="1.5"/>
  <text x="70" y="365" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">User</text>
  
  <!-- Gateway (middle) -->
  <rect x="125" y="275" width="50" height="50" fill="#7c4dff" rx="5"/>
  <text x="150" y="305" font-family="Arial" font-size="9" fill="white" text-anchor="middle">Gateway</text>
  <text x="150" y="365" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Gateway</text>
  
  <!-- User 3 -->
  <circle cx="230" cy="290" r="15" fill="none" stroke="#666" stroke-width="1.5"/>
  <line x1="230" y1="305" x2="230" y2="340" stroke="#666" stroke-width="1.5"/>
  <line x1="215" y1="320" x2="245" y2="320" stroke="#666" stroke-width="1.5"/>
  <text x="230" y="365" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">User</text>
</svg>
