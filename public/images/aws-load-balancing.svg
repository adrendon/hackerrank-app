<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 650" width="500" height="650">
  <rect width="500" height="650" fill="#f0f4f8"/>
  <!-- Grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#d0d8e0" stroke-width="0.3"/>
    </pattern>
  </defs>
  <rect width="500" height="650" fill="url(#grid)"/>

  <!-- AZ C label (top left) -->
  <rect x="30" y="30" width="40" height="25" fill="#4a90d9" rx="4"/>
  <text x="50" y="47" font-family="Arial" font-size="10" fill="white" text-anchor="middle">AZ</text>
  <text x="78" y="50" font-family="Arial" font-size="22" fill="#4a90d9" font-weight="bold">C</text>

  <!-- MariaDB Cluster icons top -->
  <rect x="160" y="50" width="30" height="25" fill="none" stroke="#4a90d9" stroke-width="1.5" rx="3"/>
  <rect x="210" y="50" width="30" height="25" fill="none" stroke="#4a90d9" stroke-width="1.5" rx="3"/>
  <text x="205" y="95" font-family="Arial" font-size="10" fill="#ff8c00" text-anchor="middle">MariaDB Cluster</text>

  <!-- Top Elastic Load Balancer -->
  <circle cx="250" cy="150" r="22" fill="#ff9966" stroke="#ff6633" stroke-width="2"/>
  <text x="280" y="145" font-family="Arial" font-size="11" fill="#333" font-weight="bold">Elastic Load</text>
  <text x="280" y="160" font-family="Arial" font-size="11" fill="#333" font-weight="bold">Balancer</text>

  <!-- Lines from top ELB to apps (pentagon shape) -->
  <polygon points="250,172 120,350 180,350 320,350 380,350 250,172" fill="none" stroke="#666" stroke-width="1.2"/>

  <!-- Cross-Zone Availability Disabled text (vertical, center) -->
  <text x="250" y="420" font-family="Arial" font-size="11" fill="#4caf50" text-anchor="middle" transform="rotate(-90 250 350)">Cross-Zone Availability Disabled</text>

  <!-- AZ A - Left side -->
  <!-- App instances -->
  <text x="110" y="360" font-family="Arial" font-size="11" fill="#ff8c00">App</text>
  <text x="170" y="360" font-family="Arial" font-size="11" fill="#ff8c00">App</text>
  <rect x="105" y="370" width="30" height="25" fill="none" stroke="#ff6633" stroke-width="1.5" rx="3"/>
  <text x="120" y="387" font-family="Arial" font-size="9" fill="#ff6633" text-anchor="middle">C5</text>
  <rect x="165" y="370" width="30" height="25" fill="none" stroke="#ff6633" stroke-width="1.5" rx="3"/>
  <text x="180" y="387" font-family="Arial" font-size="9" fill="#ff6633" text-anchor="middle">C5</text>

  <!-- Lines from apps to left ELB -->
  <line x1="120" y1="395" x2="140" y2="450" stroke="#333" stroke-width="1.5"/>
  <line x1="180" y1="395" x2="140" y2="450" stroke="#333" stroke-width="1.5"/>

  <!-- Left Elastic Load Balancer -->
  <circle cx="140" cy="470" r="18" fill="#ff9966" stroke="#ff6633" stroke-width="2"/>
  <text x="80" y="468" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Elastic Load</text>
  <text x="80" y="482" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Balancer</text>

  <!-- AZ A label -->
  <rect x="60" y="510" width="40" height="25" fill="#4a90d9" rx="4"/>
  <text x="80" y="527" font-family="Arial" font-size="10" fill="white" text-anchor="middle">AZ</text>
  <text x="108" y="530" font-family="Arial" font-size="22" fill="#4a90d9" font-weight="bold">A</text>

  <!-- AZ B - Right side -->
  <!-- App instances -->
  <text x="300" y="360" font-family="Arial" font-size="11" fill="#ff8c00">App</text>
  <text x="345" y="360" font-family="Arial" font-size="11" fill="#ff8c00">App</text>
  <text x="390" y="360" font-family="Arial" font-size="11" fill="#ff8c00">App</text>
  <rect x="295" y="370" width="30" height="25" fill="none" stroke="#ff6633" stroke-width="1.5" rx="3"/>
  <text x="310" y="387" font-family="Arial" font-size="9" fill="#ff6633" text-anchor="middle">C5</text>
  <rect x="340" y="370" width="30" height="25" fill="none" stroke="#ff6633" stroke-width="1.5" rx="3"/>
  <text x="355" y="387" font-family="Arial" font-size="9" fill="#ff6633" text-anchor="middle">C5</text>
  <rect x="385" y="370" width="30" height="25" fill="none" stroke="#ff6633" stroke-width="1.5" rx="3"/>
  <text x="400" y="387" font-family="Arial" font-size="9" fill="#ff6633" text-anchor="middle">C5</text>

  <!-- Lines from apps to right ELB -->
  <line x1="310" y1="395" x2="360" y2="450" stroke="#333" stroke-width="1.5"/>
  <line x1="355" y1="395" x2="360" y2="450" stroke="#333" stroke-width="1.5"/>
  <line x1="400" y1="395" x2="360" y2="450" stroke="#333" stroke-width="1.5"/>

  <!-- Right Elastic Load Balancer -->
  <circle cx="360" cy="470" r="18" fill="#ff9966" stroke="#ff6633" stroke-width="2"/>
  <text x="320" y="510" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Elastic Load</text>
  <text x="320" y="524" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Balancer</text>

  <!-- AZ B label -->
  <rect x="380" y="510" width="40" height="25" fill="#4a90d9" rx="4"/>
  <text x="400" y="527" font-family="Arial" font-size="10" fill="white" text-anchor="middle">AZ</text>
  <text x="428" y="530" font-family="Arial" font-size="22" fill="#4a90d9" font-weight="bold">B</text>

  <!-- Lines from ELBs to user -->
  <line x1="140" y1="488" x2="250" y2="550" stroke="#666" stroke-width="1.2"/>
  <line x1="360" y1="488" x2="250" y2="550" stroke="#666" stroke-width="1.2"/>

  <!-- User icon -->
  <circle cx="250" cy="555" r="6" fill="none" stroke="#666" stroke-width="1.5"/>
  <line x1="250" y1="561" x2="250" y2="580" stroke="#666" stroke-width="1.5"/>
  <line x1="240" y1="570" x2="260" y2="570" stroke="#666" stroke-width="1.5"/>
  <line x1="250" y1="580" x2="240" y2="595" stroke="#666" stroke-width="1.5"/>
  <line x1="250" y1="580" x2="260" y2="595" stroke="#666" stroke-width="1.5"/>

  <!-- Route 53 -->
  <rect x="310" y="575" width="35" height="35" fill="#7b42bc" rx="4"/>
  <text x="327" y="597" font-family="Arial" font-size="9" fill="white" text-anchor="middle">53</text>
  <text x="327" y="625" font-family="Arial" font-size="10" fill="#7b42bc" text-anchor="middle">Route 53</text>

  <!-- Arrow from user to Route53 -->
  <line x1="260" y1="575" x2="310" y2="590" stroke="#666" stroke-width="1" stroke-dasharray="4"/>
</svg>
